<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AMH Tracking</title>
<style>

.step{
text-align:center;
font-size:14px;
font-weight:bold;
color:#999;
min-width:70px;
}

.step.done{
color:#28a745;
}

.step.current{
color:#ff9800;
}

.line{
width:40px;
height:4px;
background:#ddd;
margin:0 5px;
}

.line.done{
background:#28a745;
}
body{
margin:0;
font-family:Arial,sans-serif;
background:#f3f5f7;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:#fff;
border-radius:18px;
padding:20px;
margin-bottom:20px;
box-shadow:0 2px 12px rgba(0,0,0,.08);
}

.header{
text-align:center;
}

.header img{
max-width:350px;
width:100%;
display:block;
margin:auto;
}

.header h2{
margin:10px 0;
font-size:32px;
color:#0b7a43;
}

.header p{
color:#666;
font-size:18px;
}

.center{
text-align:center;
}

.badge{
display:inline-block;
padding:12px 25px;
border-radius:30px;
color:#fff;
font-size:24px;
font-weight:bold;
}

.transit{
background:#ff9800;
}

.delivered{
background:#28a745;
}

.timeline{
border-left:4px solid #0b7a43;
padding-left:20px;
margin-top:15px;
}

.item{
position:relative;
margin-bottom:15px;
}

.item:before{
content:"";
width:14px;
height:14px;
background:#0b7a43;
border-radius:50%;
position:absolute;
left:-28px;
top:4px;
}

.status{
font-weight:bold;
font-size:16px;
}

.help{
text-align:center;
}

.btn{
display:inline-block;
padding:12px 22px;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:bold;
margin:5px;
}

.call{
background:#2563eb;
}

.whatsapp{
background:#25D366;
}

.item{
position:relative;
margin-bottom:25px;
padding-bottom:10px;
}

.timeline-location{
color:#2563eb;
font-weight:bold;
margin-top:4px;
}

.timeline-time{
color:#666;
font-size:14px;
margin-top:3px;
}

.item.current .status{
color:#ff9800;
font-size:18px;
}

.item.current:before{
background:#ff9800;
box-shadow:0 0 10px #ff9800;
}
  .progress-track{
display:flex;
align-items:center;
justify-content:center;
margin:25px 0;
flex-wrap:wrap;
}

.step{
text-align:center;
font-size:14px;
font-weight:bold;
color:#999;
min-width:70px;
}

.step.done{
color:#28a745;
}

.step.current{
color:#ff9800;
}

.line{
width:40px;
height:4px;
background:#ddd;
margin:0 5px;
}

.line.done{
background:#28a745;
}
</style>

</head>

<body>

<div class="container">

<div class="card header">
<img src="logo.png" alt="AMH Logo">
<h2>AYURVEDIC MEDICINE FOR HEART</h2>
<p><p>Your Trusted Partner for Heart Wellness ❤️</p></p>
</div>

<div class="card">

<div class="center" id="statusArea">
Loading...
</div>
<div id="progressBar"></div>
<br>

<div id="details">
Loading...
</div>

</div>

<div class="card">
<h2>Tracking Timeline</h2>
<div id="history">
Loading...
</div>
</div>

<div class="card help">

<h2>Need Help?</h2>

<a class="btn call" href="tel:+919358726799">
📞 Call Support
</a>

<a class="btn whatsapp" href="https://wa.me/919358726799">
💬 WhatsApp
</a>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const awb = params.get("awb");

if(!awb){

document.getElementById("statusArea").innerHTML =
"<h2>AWB Missing</h2>";

}else{

fetch("https://script.google.com/macros/s/AKfycbxGlYapnjR0tA-taA06mXj3TNnLax2wqh2B4gyJGmA3e4Hhyb0003RdAWa_belHp9KVug/exec?awb=" + awb)

.then(response => response.json())

.then(data => {

let currentStage =
data.instructions ||
data.status ||
"In Transit";

let cls = "transit";

if(currentStage.toLowerCase().includes("deliver")){
cls = "delivered";
}

document.getElementById("statusArea").innerHTML =
'<div class="badge '+cls+'">'+currentStage+'</div>';
let stage = 1;

let history = (data.history || "").toLowerCase();

// Booked
if (history.includes("manifest uploaded"))
    stage = 1;

// Received
if (
    history.includes("shipment picked up") ||
    history.includes("picked up")
)
    stage = 2;

// Transit
if (
    history.includes("trip arrived") ||
    history.includes("vehicle departed") ||
    history.includes("shipment received at facility") ||
    history.includes("bag received") ||
    history.includes("added to bag") ||
    history.includes("in transit")
)
    stage = 3;

// OFD
if (history.includes("out for delivery"))
    stage = 4;

// Delivered
if (
    history.includes("delivered to consignee") ||
    (data.status || "").toLowerCase().includes("deliver")
)
    stage = 5;

document.getElementById("progressBar").innerHTML = `
<div style="text-align:center;margin:20px 0;">

<div style="display:flex;align-items:center;justify-content:center;">

<div style="
width:22px;
height:22px;
border-radius:50%;
background:${stage>=1?'#28a745':'#ddd'};
"></div>

<div style="
width:45px;
height:4px;
background:${stage>=2?'#28a745':'#ddd'};
"></div>

<div style="
width:22px;
height:22px;
border-radius:50%;
background:${stage>=2?'#28a745':'#ddd'};
"></div>

<div style="
width:45px;
height:4px;
background:${stage>=3?'#28a745':'#ddd'};
"></div>

<div style="
width:22px;
height:22px;
border-radius:50%;
background:${stage==3?'#ff9800':stage>3?'#28a745':'#ddd'};
"></div>

<div style="
width:45px;
height:4px;
background:${stage>=4?'#28a745':'#ddd'};
"></div>

<div style="
width:22px;
height:22px;
border-radius:50%;
background:${stage==4?'#ff9800':stage>4?'#28a745':'#ddd'};
"></div>

<div style="
width:45px;
height:4px;
background:${stage>=5?'#28a745':'#ddd'};
"></div>

<div style="
width:22px;
height:22px;
border-radius:50%;
background:${stage>=5?'#28a745':'#ddd'};
"></div>

</div>

<div style="
display:flex;
justify-content:space-between;
font-size:11px;
font-weight:bold;
margin-top:10px;
">
<span>Booked</span>
<span>Received</span>
<span>Transit</span>
<span>OFD</span>
<span>Delivered</span>
</div>

</div>
`;
document.getElementById("details").innerHTML =
'<p><b>AWB:</b> '+(data.awb || '')+'</p>'+
'<p><b>Order No:</b> '+(data.orderNo || '')+'</p>'+
'<p><b>Customer:</b> '+(data.customerName || '')+'</p>'+
'<p><b>Courier:</b> '+(data.courierName || '')+'</p>'+
'<p><b>Location:</b> '+(data.location || '')+'</p>'+
'<p><b>Status:</b> '+(data.status || '')+'</p>'+
'<p><b>Estimated Delivery:</b> '+
(
data.estimatedDelivery
? new Date(data.estimatedDelivery).toLocaleDateString('en-GB',{
day:'numeric',
month:'long',
year:'numeric'
})
: 'Not Available'
)
+'</p>';
let html = '<div class="timeline">';

const rows = ((data.history)||'').split('\n');

rows.reverse().forEach((row,index)=>{

if(row.trim()!==""){

const parts = row.split('|');

let time = parts[0] ? parts[0].trim() : '';
let location = parts[1] ? parts[1].trim() : '';
let status = parts[2] ? parts[2].trim() : row;

let cls = index === 0 ? 'item current' : 'item';

html += `
<div class="${cls}">
<div class="status">${status}</div>
<div class="timeline-location">📍 ${location}</div>
<div class="timeline-time">🕒 ${time}</div>
</div>
`;

}

});

html += '</div>';

document.getElementById("history").innerHTML = html;

})

.catch(error => {

document.getElementById("statusArea").innerHTML =
"<h2>Unable to fetch tracking details</h2>";

console.log(error);

});

}

</script>

</body>
</html>
